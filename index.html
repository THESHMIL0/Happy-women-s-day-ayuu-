<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ayuu 🦋</title>
    
    <style>
        /* The overall page styling */
        body {
            background-color: #ffe4e1; /* Cute pastel pink background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Takes up the full height of the screen */
            margin: 0;
            overflow: hidden; /* Prevents scrolling when butterflies fly */
            color: #5d4037; /* Soft brown text color */
        }

        /* Styling for the interactive button */
        #reveal-btn {
            background-color: #ffb6c1; 
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0px 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s; /* Smooth bounce effect */
        }

        /* Makes the button slightly bigger when hovered */
        #reveal-btn:hover {
            transform: scale(1.1);
        }

        /* The hidden message box */
        #message-container {
            display: none; /* Hidden by default */
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.1);
            max-width: 80%;
            animation: fadeIn 2s ease-in-out; /* Smooth fade-in effect */
            z-index: 10; /* Keeps the message above the butterflies */
        }

        /* CSS Animation for fading in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Styling for the placeholder image */
        .photo-placeholder {
            width: 200px;
            height: 200px;
            background-color: #fce4ec;
            border: 4px dashed #f48fb1;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f48fb1;
            font-weight: bold;
            object-fit: cover; /* Ensures the image looks nice when added */
        }

        /* Butterfly animation classes generated by JavaScript */
        .butterfly {
            position: absolute;
            font-size: 30px;
            bottom: -50px; /* Starts below the screen */
            animation: flyUp 4s linear forwards;
            z-index: 1;
        }

        @keyframes flyUp {
            to {
                transform: translateY(-120vh) rotate(360deg); /* Flies off the top of the screen */
            }
        }
    </style>
</head>
<body>

    <button id="reveal-btn" onclick="revealSurprise()">Click for a Surprise 😼</button>

    <div id="message-container">
        <h1>Happy Women's Day, Ayuu! 🦋</h1>
        
        <img class="photo-placeholder" src="" alt="[Add Ayuu's Photo Here]">
        
        <p>You are incredibly special, amazing, and inspiring.<br>Thank you for being you!</p>
        <p><b>With love. 💕</b></p>
    </div>

    <script>
        function revealSurprise() {
            // 1. Hide the button
            document.getElementById("reveal-btn").style.display = "none";
            
            // 2. Show the hidden message
            document.getElementById("message-container").style.display = "block";
            
            // 3. Create a lot of floating butterflies!
            createButterflies();
        }

        function createButterflies() {
            // A loop to create 30 butterflies
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const butterfly = document.createElement("div");
                    butterfly.classList.add("butterfly");
                    butterfly.innerHTML = "🦋"; // The emoji used
                    
                    // Randomize where they appear horizontally
                    butterfly.style.left = Math.random() * 100 + "vw"; 
                    
                    // Randomize their flying speed slightly
                    butterfly.style.animationDuration = (Math.random() * 3 + 3) + "s"; 
                    
                    // Add the butterfly to the webpage
                    document.body.appendChild(butterfly);
                    
                    // Clean up: remove the butterfly from the code after it flies off screen
                    setTimeout(() => {
                        butterfly.remove();
                    }, 6000);
                }, i * 150); // Stagger their release times
            }
        }
    </script>

</body>
      </html>
